name: SuitPay CI/CD Pipeline

# =============================================================================
# GATILHOS
# - push: roda na main/master (código já mergeado)
# - pull_request: roda em PRs internos (mesma org)
#   Secrets NÃO são expostos a PRs de forks por padrão neste trigger.
# =============================================================================
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# =============================================================================
# JOBS
# Fluxo: lint → [api-tests ∥ e2e-tests] → qa-gate → performance
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # CAMADA 1: LINT — Gate de qualidade. Bloqueia o pipeline se falhar.
  # ---------------------------------------------------------------------------
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Node.js com cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # CAMADA 2: API TESTS — Newman (roda em paralelo com o E2E após o Lint)
  # ---------------------------------------------------------------------------
  api-tests:
    name: "🔌 API Tests (Newman)"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Node.js com cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar se o ambiente está acessível
        run: |
          TARGET_URL="${CYPRESS_BASE_URL:-https://web.sandbox.suitpay.app}"
          echo "Verificando: $TARGET_URL/login"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET_URL/login" || true)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Ambiente acessível na tentativa $i (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentativa $i: HTTP $HTTP_CODE — aguardando 10s..."
            sleep 10
          done
          echo "::warning::Ambiente pode estar instável (último HTTP $HTTP_CODE). Prosseguindo mesmo assim."
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: Executar testes de API (Newman)
        run: |
          npx newman run api-tests/suitpay-collection.json \
            --reporters cli,junit \
            --reporter-junit-export newman-results/results.xml

      - name: Publicar resultados da API no Actions (JUnit)
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: always()
        with:
          name: "Resultados API (Newman)"
          path: newman-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar relatório Newman
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: newman-report
          path: newman-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 3: E2E TESTS — Cypress + Relatório JUnit (paralelo com api-tests)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: "🌐 E2E Tests (Cypress)"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verificar se o ambiente está acessível
        run: |
          TARGET_URL="${CYPRESS_BASE_URL:-https://web.sandbox.suitpay.app}"
          echo "Verificando: $TARGET_URL/login"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET_URL/login" || true)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Ambiente acessível na tentativa $i (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentativa $i: HTTP $HTTP_CODE — aguardando 10s..."
            sleep 10
          done
          echo "::warning::Ambiente pode estar instável (último HTTP $HTTP_CODE). Prosseguindo mesmo assim."
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: Instalar Dependências e Rodar Cypress
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6.10.9
        with:
          browser: electron
          command: npm run test:e2e:ci
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USER: ${{ secrets.CYPRESS_USER }}
          CYPRESS_PASS: ${{ secrets.CYPRESS_PASS }}

      - name: Publicar resultados E2E no Actions (JUnit)
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: always()
        with:
          name: "Resultados E2E (Cypress)"
          path: cypress/results/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar Evidências (Screenshots e Vídeos)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cypress-evidence
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 4: QA GATE — Aprovação manual antes de Performance
  # Requer Environment 'qa-gate' configurado em Settings → Environments
  # ---------------------------------------------------------------------------
  qa-gate:
    name: "✅ QA Gate (Aprovação Manual)"
    runs-on: ubuntu-latest
    needs: [ api-tests, e2e-tests ]
    permissions:
      contents: read
    environment: qa-gate
    steps:
      - name: Gate aprovado
        run: echo "QA Gate aprovado. Prosseguindo para Performance..."

  # ---------------------------------------------------------------------------
  # CAMADA 5: PERFORMANCE — k6 Smoke Test (via imagem Docker Grafana)
  # Executa apenas após aprovação do QA Gate
  # ---------------------------------------------------------------------------
  performance:
    name: "⚡ Performance Baseline (k6)"
    runs-on: ubuntu-latest
    needs: qa-gate
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Executar Smoke Test com k6
        uses: grafana/k6-action@e4714b734f2b0afaabeb7b4a69142745548ab9ec # v0.3.1
        with:
          filename: k6/smoke-test.js
          flags: --out json=k6/results.json
        env:
          K6_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: Salvar resultados k6
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: k6-results
          path: k6/results.json
          retention-days: 7
