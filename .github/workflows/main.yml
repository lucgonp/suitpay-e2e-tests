name: SuitPay CI/CD Pipeline

# =============================================================================
# GATILHOS: Dispara em push/PR para main e master
# =============================================================================
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# =============================================================================
# PERMISSÕES: Necessário para o dorny/test-reporter publicar checks
# =============================================================================
permissions:
  checks: write
  contents: read
  pull-requests: write

# =============================================================================
# JOBS
# Fluxo: lint → [api-tests ∥ e2e-tests] → qa-gate → performance
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # CAMADA 1: LINT — Gate de qualidade. Bloqueia o pipeline se falhar.
  # ---------------------------------------------------------------------------
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js com cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # CAMADA 2: API TESTS — Newman (roda em paralelo com o E2E após o Lint)
  # ---------------------------------------------------------------------------
  api-tests:
    name: "🔌 API Tests (Newman)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js com cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar se o ambiente está acessível
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.CYPRESS_BASE_URL }}/login" || true)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Ambiente acessível na tentativa $i (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentativa $i: HTTP $HTTP_CODE — aguardando 10s..."
            sleep 10
          done
          echo "Ambiente inacessível após 5 tentativas"
          exit 1

      - name: Executar testes de API (Newman)
        run: npm run test:api
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USER: ${{ secrets.CYPRESS_USER }}
          CYPRESS_PASS: ${{ secrets.CYPRESS_PASS }}

      - name: Publicar resultados da API no Actions (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Resultados API (Newman)"
          path: newman-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar relatório Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 3: E2E TESTS — Cypress + Relatório JUnit (paralelo com api-tests)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: "🌐 E2E Tests (Cypress)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar se o ambiente está acessível
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.CYPRESS_BASE_URL }}/login" || true)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Ambiente acessível na tentativa $i (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentativa $i: HTTP $HTTP_CODE — aguardando 10s..."
            sleep 10
          done
          echo "Ambiente inacessível após 5 tentativas"
          exit 1

      - name: Instalar Dependências e Rodar Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: electron
          # Gera relatório JUnit para exibição no painel do Actions
          command: npm run test:e2e:ci
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USER: ${{ secrets.CYPRESS_USER }}
          CYPRESS_PASS: ${{ secrets.CYPRESS_PASS }}

      - name: Publicar resultados E2E no Actions (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Resultados E2E (Cypress)"
          path: cypress/results/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar Evidências (Screenshots e Vídeos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-evidence
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 4: QA GATE — Aprovação manual antes de Performance
  # Requer Environment 'qa-gate' configurado em Settings → Environments
  # ---------------------------------------------------------------------------
  qa-gate:
    name: "✅ QA Gate (Aprovação Manual)"
    runs-on: ubuntu-latest
    needs: [ api-tests, e2e-tests ]
    environment: qa-gate   # <-- Bloqueia aqui até aprovação do reviewer
    steps:
      - name: Gate aprovado
        run: echo "✅ QA Gate aprovado. Prosseguindo para Performance..."

  # ---------------------------------------------------------------------------
  # CAMADA 5: PERFORMANCE — k6 Smoke Test (via imagem Docker Grafana)
  # Executa apenas após aprovação do QA Gate
  # ---------------------------------------------------------------------------
  performance:
    name: "⚡ Performance Baseline (k6)"
    runs-on: ubuntu-latest
    needs: qa-gate
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar Smoke Test com k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/smoke-test.js
          flags: --out json=k6/results.json
        env:
          K6_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: Salvar resultados k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6/results.json
          retention-days: 7

