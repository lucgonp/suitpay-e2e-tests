name: SuitPay CI/CD Pipeline

# =============================================================================
# GATILHOS: Dispara em push/PR para main e master
# =============================================================================
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# =============================================================================
# PERMISSÕES: Necessário para o dorny/test-reporter publicar checks
# =============================================================================
permissions:
  checks: write
  contents: read
  pull-requests: write

# =============================================================================
# JOBS
# Fluxo: lint → [api-tests ∥ e2e-tests] → qa-gate → performance
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # CAMADA 1: LINT — Gate de qualidade. Bloqueia o pipeline se falhar.
  # ---------------------------------------------------------------------------
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js com cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # CAMADA 2: API TESTS — Newman (roda em paralelo com o E2E após o Lint)
  # ---------------------------------------------------------------------------
  api-tests:
    name: "🔌 API Tests (Newman)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js com cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar se o ambiente está acessível
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 ${{ secrets.CYPRESS_BASE_URL }}/login > /dev/null; then
              echo "Ambiente acessível na tentativa $i"
              exit 0
            fi
            echo "Tentativa $i falhou, aguardando 10s..."
            sleep 10
          done
          echo "Ambiente inacessível após 5 tentativas"
          exit 1

      - name: Executar testes de API (Newman)
        run: npm run test:api
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USER: ${{ secrets.CYPRESS_USER }}
          CYPRESS_PASS: ${{ secrets.CYPRESS_PASS }}

      - name: Publicar resultados da API no Actions (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Resultados API (Newman)"
          path: newman-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar relatório Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 3: E2E TESTS — Cypress + Relatório JUnit (paralelo com api-tests)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: "🌐 E2E Tests (Cypress)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar se o ambiente está acessível
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 ${{ secrets.CYPRESS_BASE_URL }}/login > /dev/null; then
              echo "Ambiente acessível na tentativa $i"
              exit 0
            fi
            echo "Tentativa $i falhou, aguardando 10s..."
            sleep 10
          done
          echo "Ambiente inacessível após 5 tentativas"
          exit 1

      - name: Instalar Dependências e Rodar Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: electron
          # Gera relatório JUnit para exibição no painel do Actions
          command: npm run test:e2e:ci
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_USER: ${{ secrets.CYPRESS_USER }}
          CYPRESS_PASS: ${{ secrets.CYPRESS_PASS }}

      - name: Publicar resultados E2E no Actions (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Resultados E2E (Cypress)"
          path: cypress/results/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Salvar Evidências (Screenshots e Vídeos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-evidence
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CAMADA 4: QA GATE — Aprovação manual antes de Performance
  # Requer Environment 'qa-gate' configurado em Settings → Environments
  # ---------------------------------------------------------------------------
  qa-gate:
    name: "✅ QA Gate (Aprovação Manual)"
    runs-on: ubuntu-latest
    needs: [ api-tests, e2e-tests ]
    environment: qa-gate   # <-- Bloqueia aqui até aprovação do reviewer
    steps:
      - name: Gate aprovado
        run: echo "✅ QA Gate aprovado. Prosseguindo para Performance..."

  # ---------------------------------------------------------------------------
  # CAMADA 5: PERFORMANCE — k6 Smoke Test (via imagem Docker Grafana)
  # Executa apenas após aprovação do QA Gate
  # ---------------------------------------------------------------------------
  performance:
    name: "⚡ Performance Baseline (k6)"
    runs-on: ubuntu-latest
    needs: qa-gate
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar Smoke Test com k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/smoke-test.js
          flags: --out json=k6/results.json
        env:
          K6_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}

      - name: Salvar resultados k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6/results.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB FINAL: NOTIFICAÇÃO POR EMAIL
  # Roda sempre (if: always()), mesmo se qualquer job anterior falhar.
  # Requer secrets: MAIL_SMTP_SERVER, MAIL_SMTP_PORT, MAIL_USERNAME, MAIL_PASSWORD
  # ---------------------------------------------------------------------------
  notify:
    name: "📧 Relatório por Email"
    runs-on: ubuntu-latest
    needs: [ lint, api-tests, e2e-tests ]
    if: always()
    steps:
      - name: Determinar status geral do pipeline
        id: pipeline-status
        run: |
          LINT="${{ needs.lint.result }}"
          API="${{ needs.api-tests.result }}"
          E2E="${{ needs.e2e-tests.result }}"

          if [[ "$LINT" == "success" && "$API" == "success" && "$E2E" == "success" ]]; then
            echo "status=✅ PASSOU" >> $GITHUB_OUTPUT
            echo "color=#22c55e" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FALHOU" >> $GITHUB_OUTPUT
            echo "color=#ef4444" >> $GITHUB_OUTPUT
          fi

      - name: Enviar resultado por email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SMTP_SERVER }}
          server_port: ${{ secrets.MAIL_SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: andrezanata@suitpay.app
          from: "SuitPay CI/CD <${{ secrets.MAIL_USERNAME }}>"
          subject: "${{ steps.pipeline-status.outputs.status }} — SuitPay E2E | ${{ github.ref_name }} | ${{ github.event_name }}"
          html_body: |
            <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
              <div style="background: ${{ steps.pipeline-status.outputs.color }}; padding: 16px 24px; border-radius: 8px 8px 0 0;">
                <h2 style="color: white; margin: 0;">
                  ${{ steps.pipeline-status.outputs.status }} — SuitPay CI/CD
                </h2>
              </div>
              <div style="border: 1px solid #e5e7eb; border-top: none; padding: 24px; border-radius: 0 0 8px 8px;">
                <table style="width: 100%; border-collapse: collapse;">
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280; width: 140px;"><strong>Branch</strong></td>
                    <td style="padding: 8px 0;">${{ github.ref_name }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280;"><strong>Evento</strong></td>
                    <td style="padding: 8px 0;">${{ github.event_name }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280;"><strong>Commit</strong></td>
                    <td style="padding: 8px 0; font-family: monospace;">${{ github.sha }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280;"><strong>Lint</strong></td>
                    <td style="padding: 8px 0;">${{ needs.lint.result }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280;"><strong>API Tests</strong></td>
                    <td style="padding: 8px 0;">${{ needs.api-tests.result }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 0; color: #6b7280;"><strong>E2E Tests</strong></td>
                    <td style="padding: 8px 0;">${{ needs.e2e-tests.result }}</td>
                  </tr>
                </table>
                <div style="margin-top: 24px; text-align: center;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="background: #1d4ed8; color: white; padding: 12px 24px; border-radius: 6px;
                            text-decoration: none; font-weight: bold; display: inline-block;">
                    Ver resultado completo no GitHub Actions →
                  </a>
                </div>
              </div>
              <p style="color: #9ca3af; font-size: 12px; text-align: center; margin-top: 16px;">
                Enviado automaticamente pelo pipeline SuitPay CI/CD
              </p>
            </div>